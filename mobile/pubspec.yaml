name: e_continuity
description: E-Continuity — SaaS Cloud de Continuité Numérique
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  google_fonts: ^6.1.0
  intl: ^0.19.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.0
  web_socket_channel: ^2.4.0
  flutter_webrtc: ^0.10.0
  permission_handler: ^11.3.0
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  local_auth: ^2.1.0
  workmanager: ^0.5.0
  flutter_local_notifications: ^17.0.0
  encrypt: ^5.0.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
