version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: econtinuity
      POSTGRES_USER: econtinuity
      POSTGRES_PASSWORD: econtinuity_secret
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["3001:3001"]
    environment:
      DATABASE_URL: postgresql://econtinuity:econtinuity_secret@postgres:5432/econtinuity
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
